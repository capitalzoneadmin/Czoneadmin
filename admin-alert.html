<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Alerts - CZone Admin</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="admin-alert.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading"><div class="spinner"></div><p>CZone Admin</p></div>
    <div class="app" id="mainContent">
        <!-- Header -->
        <header>
            <div class="header-top">
                <div class="logo-area">
                    <img id="adminLogo" class="logo" src="/IMG_20260313_225034.png" alt="CZ">
                    <span class="shop-name">Admin Alerts</span>
                </div>
                <div class="header-icons">
                    <button class="icon-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                    <button class="icon-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
                </div>
            </div>
        </header>

        <div class="content">
            <!-- Create Alert Form -->
            <div class="form-section">
                <h3><i class="fas fa-bell"></i> Create New Alert</h3>

                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="alertType" value="message" checked> Message
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="alertType" value="offer"> Offer
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="alertType" value="banner"> Banner
                    </label>
                </div>

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="alertTitle" placeholder="e.g. Special Discount">
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea id="alertMessage" placeholder="Enter alert message..."></textarea>
                </div>

                <div class="form-group" id="linkGroup" style="display: none;">
                    <label>Link URL</label>
                    <input type="url" id="alertLink" placeholder="https://example.com">
                </div>

                <div class="form-group" id="imageGroup" style="display: none;">
                    <label>Banner Image</label>
                    <div class="image-upload-area" id="imageUploadArea">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click or drag image (max 500KB)</p>
                        <input type="file" id="imageInput" accept="image/*" style="display: none;">
                    </div>
                    <img id="imagePreview" class="image-preview" src="#" alt="Preview">
                </div>

                <div class="form-group">
                    <label>Send to</label>
                    <select id="targetSelect">
                        <option value="all">All Users</option>
                        <option value="specific">Specific Users</option>
                    </select>
                </div>

                <div id="userSelection" class="user-selection" style="display: none;">
                    <label>Select Users</label>
                    <div class="user-list-container" id="usersList"></div>
                </div>

                <button class="submit-btn" id="sendAlertBtn">
                    <i class="fas fa-paper-plane"></i> Send Alert
                </button>
            </div>

            <!-- Sent Alerts List -->
            <div class="form-section">
                <h3><i class="fas fa-history"></i> Sent Alerts</h3>
                <div id="alertsList" class="alerts-list"></div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item" data-page="index.html"><i class="fas fa-home"></i><span>Home</span></div>
            <div class="nav-item" data-page="add-items.html"><i class="fas fa-plus-circle"></i><span>Add</span></div>
            <div class="nav-item" data-page="show-items.html"><i class="fas fa-list"></i><span>Items</span></div>
            <div class="nav-item active"><i class="fas fa-bell"></i><span>Alerts</span></div>
            <div class="nav-item" data-page="admin-account.html"><i class="fas fa-user"></i><span>Account</span></div>
        </nav>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <i class="fas fa-arrow-left" id="closeEditModal"></i>
                <h3>Edit Alert</h3>
                <i class="fas fa-times" id="closeEditModalBtn"></i>
            </div>
            <div class="modal-body" id="editModalBody"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script src="admin-alert.js"></script>
</body>
</html>
