<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Tracking Management - CZone Admin</title>
    <link rel="stylesheet" href="admin-tracking.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* Emergency loading fix */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        #loading.hide {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <div class="spinner"></div>
        <p style="color:white; margin-top:10px;">CZone Admin</p>
    </div>

    <!-- Main Content -->
    <div class="app" id="mainContent">
        <!-- Header -->
        <header>
            <div class="header-top">
                <div class="logo-area">
                    <img id="adminLogo" class="logo" src="/IMG_20260313_225034.png" alt="CZ">
                    <span class="shop-name">Tracking Management</span>
                </div>
                <div class="header-icons">
                    <button class="icon-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                    <button class="icon-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
                </div>
            </div>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by order ID or tracking ID..." autocomplete="off">
                <i class="fas fa-times" id="clearSearch"></i>
            </div>
            <div class="suggestions" id="suggestions"></div>
        </div>

        <!-- Orders List -->
        <div id="ordersList" class="orders-list">
            <!-- Orders will be loaded here -->
        </div>

        <!-- No Orders Message -->
        <div id="noOrders" class="no-orders" style="display: none;">
            <i class="fas fa-box-open"></i>
            <h3>No Orders Found</h3>
            <p>Search for an order to manage tracking</p>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item" data-page="admin-index.html"><i class="fas fa-home"></i><span>Home</span></div>
            <div class="nav-item" data-page="add-items.html"><i class="fas fa-plus-circle"></i><span>Add</span></div>
            <div class="nav-item" data-page="show-items.html"><i class="fas fa-list"></i><span>Items</span></div>
            <div class="nav-item active"><i class="fas fa-map-marker-alt"></i><span>Tracking</span></div>
            <div class="nav-item" data-page="admin-account.html"><i class="fas fa-user"></i><span>Account</span></div>
        </nav>
    </div>

    <!-- Tracking Management Modal -->
    <div id="trackingModal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <i class="fas fa-arrow-left" id="closeModal"></i>
                <h3>Manage Tracking</h3>
                <i class="fas fa-times" id="closeModalBtn"></i>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Add Event Modal -->
    <div id="addEventModal" class="modal-small">
        <div class="modal-small-content">
            <h3>Add Tracking Event</h3>
            <div class="form-group">
                <label>Status</label>
                <input type="text" id="eventStatus" placeholder="e.g. Out for Delivery">
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="eventLocation" placeholder="e.g. Colombo">
            </div>
            <div class="form-group">
                <label>Date & Time</label>
                <input type="datetime-local" id="eventTime">
            </div>
            <div class="modal-small-buttons">
                <button class="modal-btn secondary" id="cancelAddEvent">Cancel</button>
                <button class="modal-btn primary" id="saveEvent">Add Event</button>
            </div>
        </div>
    </div>

    <!-- Edit Event Modal -->
    <div id="editEventModal" class="modal-small">
        <div class="modal-small-content">
            <h3>Edit Tracking Event</h3>
            <div class="form-group">
                <label>Status</label>
                <input type="text" id="editEventStatus">
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="editEventLocation">
            </div>
            <div class="form-group">
                <label>Date & Time</label>
                <input type="datetime-local" id="editEventTime">
            </div>
            <div class="modal-small-buttons">
                <button class="modal-btn secondary" id="cancelEditEvent">Cancel</button>
                <button class="modal-btn primary" id="saveEditEvent">Save</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal-small">
        <div class="modal-small-content">
            <div class="modal-small-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <h3>Delete Event</h3>
            <p>Are you sure you want to delete this tracking event?</p>
            <div class="modal-small-buttons">
                <button class="modal-btn secondary" id="cancelDelete">Cancel</button>
                <button class="modal-btn danger" id="confirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script src="admin-tracking.js"></script>
</body>
</html>
