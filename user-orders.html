<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Order Management - Capital Zone Admin</title>
    <link rel="stylesheet" href="user-orders.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Capital Zone</p>
    </div>

    <!-- Main Content -->
    <div class="admin-container" id="mainContent">
        <!-- Header -->
        <header>
            <div class="header-top">
                <div class="logo-area">
                    <i class="fas fa-arrow-left" id="backBtn"></i>
                    <span class="page-title">Order Management</span>
                </div>
                <div class="header-icons">
                    <i class="fas fa-home" id="homeIcon"></i>
                </div>
            </div>
        </header>

        <!-- Order Tabs -->
        <div class="order-tabs">
            <button class="tab-btn active" data-status="pending">
                <i class="fas fa-clock"></i>
                <span>Pending</span>
                <span class="tab-count" id="pendingCount">0</span>
            </button>
            <button class="tab-btn" data-status="confirmed">
                <i class="fas fa-check-circle"></i>
                <span>Confirmed</span>
                <span class="tab-count" id="confirmedCount">0</span>
            </button>
            <button class="tab-btn" data-status="delivered">
                <i class="fas fa-truck"></i>
                <span>Delivered</span>
                <span class="tab-count" id="deliveredCount">0</span>
            </button>
            <button class="tab-btn" data-status="cancelled">
                <i class="fas fa-times-circle"></i>
                <span>Cancelled</span>
                <span class="tab-count" id="cancelledCount">0</span>
            </button>
        </div>

        <!-- Orders Container -->
        <div class="orders-container">
            <!-- No Orders Message -->
            <div id="noOrders" class="no-orders" style="display: none;">
                <i class="fas fa-inbox"></i>
                <h3>No Orders Found</h3>
                <p id="noOrdersMessage">No pending orders at the moment</p>
            </div>

            <!-- Orders List -->
            <div class="orders-list" id="ordersList">
                <!-- Orders will be loaded here -->
            </div>
        </div>

        <!-- Back to Top Button -->
        <button id="backToTop" class="back-to-top" style="display: none;">
            <i class="fas fa-arrow-up"></i>
        </button>
    </div>

    <!-- Order Details Modal -->
    <div id="orderModal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3><i class="fas fa-shopping-bag"></i> Order Details</h3>
                <i class="fas fa-times" id="closeModalBtn"></i>
            </div>
            <div class="modal-body" id="orderModalBody">
                <!-- Order details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Confirm Order Modal -->
    <div id="confirmModal" class="modal-small">
        <div class="modal-small-content">
            <div class="modal-small-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3>Confirm Order</h3>
            <p>Enter tracking information for this order</p>
            
            <div class="form-group">
                <label>Tracking Number</label>
                <input type="text" id="trackingNumber" placeholder="Enter tracking number" class="tracking-input">
                <small class="help-text">Example: CZ-2024-00123</small>
            </div>

            <div class="form-group">
                <label>Payment Status</label>
                <select id="paymentStatus" class="payment-select">
                    <option value="pending">Pending</option>
                    <option value="successful">Successful</option>
                    <option value="unsuccessful">Unsuccessful</option>
                </select>
            </div>

            <div class="payment-note" id="paymentNote" style="display: none;">
                <i class="fas fa-info-circle"></i>
                <span id="paymentNoteText"></span>
            </div>

            <div class="modal-small-buttons">
                <button class="modal-btn secondary" id="cancelConfirmBtn">Cancel</button>
                <button class="modal-btn primary" id="confirmOrderBtn">Confirm Order</button>
            </div>
        </div>
    </div>

    <!-- Deliver Order Modal -->
    <div id="deliverModal" class="modal-small">
        <div class="modal-small-content">
            <div class="modal-small-icon">
                <i class="fas fa-truck"></i>
            </div>
            <h3>Mark as Delivered</h3>
            <p>Are you sure you want to mark this order as delivered?</p>
            <div class="modal-small-buttons">
                <button class="modal-btn secondary" id="cancelDeliverBtn">Cancel</button>
                <button class="modal-btn primary" id="confirmDeliverBtn">Yes, Delivered</button>
            </div>
        </div>
    </div>

    <!-- Success Toast -->
    <div id="toast" class="toast"></div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="user-orders.js"></script>
</body>
</html>
