<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Promo Links - CZone Admin</title>
    <link rel="stylesheet" href="admin-promo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <div class="spinner"></div>
        <p>CZone Admin</p>
    </div>

    <!-- Main Content -->
    <div class="app" id="mainContent">
        <!-- Header -->
        <header>
            <div class="header-top">
                <div class="logo-area">
                    <i class="fas fa-arrow-left" id="backBtn"></i>
                    <img id="adminLogo" class="logo" src="/IMG_20260313_225034.png" alt="Capital Zone">
                    <span class="shop-name">Promo Links</span>
                </div>
                <div class="header-icons">
                    <i class="fas fa-bell" id="notificationIcon"></i>
                    <i class="fas fa-user-circle" id="profileIcon"></i>
                </div>
            </div>
        </header>

        <!-- Add New Promo Button -->
        <div class="add-button-container">
            <button id="addNewPromoBtn">
                <i class="fas fa-plus-circle"></i> Add New Promo Link
            </button>
        </div>

        <!-- Promo Links List -->
        <div class="promo-list" id="promoList"></div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item" data-page="admin-index.html">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </div>
            <div class="nav-item active" data-page="admin-promo.html">
                <i class="fas fa-bolt"></i>
                <span>Promo</span>
            </div>
            <div class="nav-item" data-page="admin-messenger.html">
                <i class="fas fa-comment"></i>
                <span>Chat</span>
            </div>
            <div class="nav-item" data-page="admin-account.html">
                <i class="fas fa-user"></i>
                <span>Account</span>
            </div>
        </nav>
    </div>

    <!-- Add/Edit Promo Modal -->
    <div id="promoModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Promo Link</h3>
                <i class="fas fa-times" id="closeModalBtn"></i>
            </div>
            
            <div class="modal-body">
                <!-- Title -->
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Title</label>
                    <input type="text" id="promoTitle" placeholder="e.g., Today Collection" maxlength="50">
                </div>

                <!-- Image URL Input (replaced file upload) -->
                <div class="form-group">
                    <label><i class="fas fa-image"></i> Image URL</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="url" id="promoImageUrl" class="url-input" placeholder="https://example.com/image.jpg" style="flex: 1;">
                        <button type="button" id="testImageBtn" class="test-btn">Test</button>
                    </div>
                    <small class="help-text">Enter the direct URL of your image (from Imgur, Google Photos, etc.)</small>
                    <div class="image-preview" id="promoImagePreview" style="display: none;">
                        <img id="previewImg" src="" alt="Preview">
                        <i class="fas fa-times remove-image" id="removeImage"></i>
                    </div>
                </div>

                <!-- Link URL -->
                <div class="form-group">
                    <label><i class="fas fa-link"></i> Link URL</label>
                    <input type="text" id="promoLink" placeholder="e.g., today-collection.html">
                </div>

                <!-- Background Color -->
                <div class="form-group">
                    <label><i class="fas fa-palette"></i> Background Color</label>
                    <select id="promoColor">
                        <option value="linear-gradient(135deg, #2196f3, #64b5f6)">Blue (Today Collection)</option>
                        <option value="linear-gradient(135deg, #f44336, #ff7961)">Red (Flash Deal)</option>
                        <option value="linear-gradient(135deg, #4caf50, #81c784)">Green</option>
                        <option value="linear-gradient(135deg, #ff9800, #ffb74d)">Orange</option>
                        <option value="linear-gradient(135deg, #9c27b0, #ba68c8)">Purple</option>
                        <option value="linear-gradient(135deg, #607d8b, #90a4ae)">Gray</option>
                    </select>
                </div>

                <!-- Status -->
                <div class="form-group">
                    <label><i class="fas fa-eye"></i> Status</label>
                    <select id="promoStatus">
                        <option value="active">Active (Visible to customers)</option>
                        <option value="inactive">Inactive (Hidden)</option>
                    </select>
                </div>

                <!-- Buttons -->
                <div class="modal-actions">
                    <button id="savePromoBtn" class="btn-save">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <button id="cancelPromoBtn" class="btn-cancel">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content delete-modal">
            <div class="delete-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3>Delete Promo</h3>
            <p id="deleteMessage">Are you sure you want to delete this promo link?</p>
            <div class="delete-actions">
                <button id="confirmDeleteBtn" class="btn-delete">Delete</button>
                <button id="cancelDeleteBtn" class="btn-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast Message -->
    <div id="toast" class="toast"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="admin-promo.js"></script>
</body>
</html>
